events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream frontend_prod {
        server frontend-prod;
    }

    upstream frontend_stg {
        server frontend-stg;
    }

    upstream backend_prod {
        server backend-prod:8000;
    }

    upstream backend_stg {
        server backend-stg:8000;
    }

    server {
        listen 80;
        server_name app-sukejuru.yudais-prod.com;

        location / {
            proxy_pass http://frontend_prod;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name stg-sukejuru.yudais-prod.com;

        location / {
            proxy_pass http://frontend_stg;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /api/ {
            proxy_pass http://backend_stg/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

}