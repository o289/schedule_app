events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=10s;
    #
    # HTTP → HTTPS redirect
    #
    server {
        listen 80;
        server_name app-sukejuru.yudais-prod.com stg-sukejuru.yudais-prod.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    #
    # PROD
    #
    server {
        listen 443 ssl;
        server_name app-sukejuru.yudais-prod.com;

        ssl_certificate     /etc/letsencrypt/live/yudais-prod.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yudais-prod.com/privkey.pem;

        location / {
            set $frontend_prod frontend-prod:80;
            proxy_pass http://$frontend_prod;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /api/ {
            set $backend_prod backend-prod:8000;
            proxy_pass http://$backend_prod/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
    #
    # STG
    #
    server {
        listen 443 ssl;
        server_name stg-sukejuru.yudais-prod.com;

        ssl_certificate     /etc/letsencrypt/live/yudais-prod.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yudais-prod.com/privkey.pem;

        location / {
            set $frontend_stg frontend-stg:80;
            proxy_pass http://$frontend_stg;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /api/ {
            set $backend_stg backend-stg:8000;
            proxy_pass http://$backend_stg/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}