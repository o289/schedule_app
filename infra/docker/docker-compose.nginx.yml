services:
  nginx:
    image: nginx:alpine
    container_name: ingress-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - schedule_app_net
    restart: always

networks:
  schedule_app_net:
    external: true
