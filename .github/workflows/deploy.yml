name: Deploy to VPS with Backup and Rollback (Image Tag)
on:
  push:
    branches:
      - main

jobs:
  check-pr-source:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: 🚦 Validate PR source branch
        run: |
          echo "----------------------------------------"
          echo "🔍 Pull Request validation check"
          echo "Target branch : ${{ github.base_ref }}"
          echo "Source branch : ${{ github.head_ref }}"
          echo "----------------------------------------"

          if [[ "${{ github.head_ref }}" =~ ^release/ ]]; then
            echo "✅ OK: '${{ github.head_ref }}' is a valid release branch."
          else
            echo "❌ ERROR: Only branches starting with 'release/' can be merged into main."
            echo "🧱 Please open your PR from a 'release/*' branch instead."
            exit 1
          fi
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 0. 定期実行のDBバックアップで失敗したら、デプロイを走らせない
      # - name: Check latest Daily DB Backup workflow run status
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     REPO: ${{ github.repository }}
      #   run: |
      #     echo "Checking latest Daily DB Backup workflow run status..."
      #     WORKFLOW_NAME="Daily DB Backup"
      #     LATEST_RUN_STATUS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
      #       "https://api.github.com/repos/$REPO/actions/workflows" | \
      #       jq -r --arg name "$WORKFLOW_NAME" '.workflows[] | select(.name == $name) | .id' | \
      #       xargs -I {} curl -s -H "Authorization: token $GITHUB_TOKEN" \
      #       "https://api.github.com/repos/$REPO/actions/workflows/{}/runs?per_page=1" | \
      #       jq -r '.workflow_runs[0].conclusion')
      #     if [ "$LATEST_RUN_STATUS" != "success" ]; then
      #       echo "Latest Daily DB Backup workflow run did not succeed. Aborting deployment."
      #       exit 1
      #     fi
      #     echo "Latest Daily DB Backup workflow run succeeded. Continuing deployment."

      # 1. Secretsから.env.prodを生成（改行を保持）
      - name: Create local .env.prod from secrets
        run: |
          cat <<'EOF' > .env.prod
          ${{ secrets.ENV_PROD_FILE }}
          EOF
      # env.prodをプロジェクトにコピー
      - name: Copy .env.prod to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".env.prod"
          target: "/home/${{ secrets.VPS_USER }}/schedule_app/"

      # 2 mainコードの反映
      - name: Ensure repo exists on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 致命的: リポジトリの状態が正しくないとデプロイできないため
          script: |
            cd /home/${{ secrets.VPS_USER }}
            if [ ! -d "schedule_app" ]; then
              echo "📥 Cloning repository..."
              git clone https://github.com/o289/schedule_app.git
            else
              echo "🔄 Updating repository..."
              cd schedule_app
              git fetch origin
              git reset --hard origin/main
            fi

      # 3.1 不正データを削除
      - name: Clean invalid schedules before backup
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            echo "🧹 Cleaning invalid and orphaned schedules..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T db-prod \
            psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
            "DELETE FROM schedule_dates WHERE end_date <= start_date; \
             DELETE FROM schedules WHERE NOT EXISTS (SELECT 1 FROM schedule_dates WHERE schedule_dates.schedule_id = schedules.id);"
            echo "✅ Clean-up completed."

      # 3.2 DBバックアップ
      - name: Backup DB before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 致命的: DBバックアップ失敗はデプロイ失敗に直結するため
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app || exit 1
            mkdir -p backups

            echo "🔄 Restarting DB container to ensure env is loaded..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d db-prod

            echo "⏳ Waiting for PostgreSQL to be ready..."
            until docker compose -f infra/docker/docker-compose.prod.yml exec -T db-prod \
              pg_isready -U "$POSTGRES_USER"; do
              sleep 2
            done

            echo "💾 Taking database backup..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T db-prod \
              sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
              > backups/backup_$(date +%F_%H-%M).sql

      - name: Build backend and frontend images (no-cache)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            echo "🔨 Build backend and frontend images (no-cache)..."
            docker compose -f infra/docker/docker-compose.prod.yml build --no-cache backend-prod frontend-prod

  migrate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Alembic migrations (if new files exist)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            # Check for new migration files
            if [ "$(ls -A backend/alembic/versions/*.py 2>/dev/null)" ]; then
              echo "🗄️ Running Alembic migrations..."
              docker compose -f infra/docker/docker-compose.prod.yml run --rm backend-prod alembic upgrade head
            else
              echo "ℹ️ No Alembic migration files detected, skipping."
            fi

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy App (with no-cache build + rollback check)
        id: deploy-step
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 致命的: デプロイ失敗時はロールバックを行うため
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app

            echo "🚀 Start frontend with new image..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d

            echo "🔍 Check dist contents in frontend..."
            if ! docker compose -f infra/docker/docker-compose.prod.yml exec -T frontend ls -la /usr/share/nginx/html >/dev/null 2>&1; then
              echo "⚠️ Dist folder not found. Rolling back ALL app containers (DB is preserved)..."

              BACKUP_DIR=image_backups
              BACKEND_IMAGE=$(ls -t ${BACKUP_DIR}/backend_*.tar 2>/dev/null | head -n1)
              FRONTEND_IMAGE=$(ls -t ${BACKUP_DIR}/frontend_*.tar 2>/dev/null | head -n1)

              if [ -f "$BACKEND_IMAGE" ] && [ -f "$FRONTEND_IMAGE" ]; then
                docker load -i "$BACKEND_IMAGE"
                docker load -i "$FRONTEND_IMAGE"

                # DBコンテナは止めずに、アプリケーションだけ再起動
                docker compose -f infra/docker/docker-compose.prod.yml stop backend-prod frontend-prod || true
                docker compose -f infra/docker/docker-compose.prod.yml rm -f backend-prod frontend-prod || true
                docker compose -f infra/docker/docker-compose.prod.yml up -d --no-build

                echo "✅ Rolled back to stable version (DB preserved)."
              else
                echo "❌ No backup images found. Manual intervention required!"
                exit 1
              fi
            else
              echo "✅ Deployment successful. All containers running with new images."
            fi

      # 6. 失敗時のログ収集
      - name: Collect docker logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 補助的: ログ収集失敗は致命的ではないため継続可能
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            docker compose -f infra/docker/docker-compose.prod.yml logs --tail=200 > deploy-error.log

      - name: Download error logs from VPS
        if: failure()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "/home/${{ secrets.VPS_USER }}/schedule_app/deploy-error.log"
          target: "./logs/"
        # 補助的: ログダウンロード失敗は致命的ではないため継続可能

      - name: Upload logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-error-logs
          path: logs/deploy-error.log
        # 補助的: アップロード失敗は致命的ではないため継続可能

      # 7. 失敗時のロールバック（前の安定版に戻す）
      - name: Rollback to previous image
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 致命的: ロールバック失敗はアプリ継続稼働に直結するため必須
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            echo "🚨 Deployment failed. Rolling back..."
            BACKUP_DIR=image_backups
            BACKEND_IMAGE=$(ls -t ${BACKUP_DIR}/backend_*.tar 2>/dev/null | head -n1)
            FRONTEND_IMAGE=$(ls -t ${BACKUP_DIR}/frontend_*.tar 2>/dev/null | head -n1)

            if [ -f "$BACKEND_IMAGE" ]; then
              echo "🔄 Loading backend image from backup: $BACKEND_IMAGE"
              docker load -i "$BACKEND_IMAGE"
            else
              echo "⚠️ No backend backup image found."
            fi

            if [ -f "$FRONTEND_IMAGE" ]; then
              echo "🔄 Loading frontend image from backup: $FRONTEND_IMAGE"
              docker load -i "$FRONTEND_IMAGE"
            else
              echo "⚠️ No frontend backup image found."
            fi

            echo "🛑 Stopping backend and frontend containers..."
            docker compose -f infra/docker/docker-compose.prod.yml stop backend-prod frontend-prod || true

            echo "🗑️ Removing backend and frontend containers..."
            docker compose -f infra/docker/docker-compose.prod.yml rm -f backend-prod frontend-prod || true

            echo "🚀 Starting backend and frontend containers with restored images..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d --no-build backend-prod frontend-prod

            echo "✅ Rollback completed. Backend and frontend containers restored. DB container is preserved."

      # 8. 成功時にイメージを保存（latestイメージをtarアーカイブ化）
      - name: Save Docker images on success
        if: success()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 補助的: イメージ保存失敗は致命的ではないため継続可能
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            mkdir -p image_backups
            docker save -o image_backups/backend_$(date +%F).tar schedule_app-backend:latest
            docker save -o image_backups/frontend_$(date +%F).tar schedule_app-frontend:latest
            ls -lh image_backups/

      # 9. デプロイ成功時のみ Docker キャッシュを削除
      - name: Cleanup Docker cache after successful deploy
        if: success()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # 重要: デプロイが完全に成功した後のみ実行する
          script: |
            cd /home/${{ secrets.VPS_USER }}/schedule_app
            echo "🧹 Cleaning Docker build cache and unused images..."
            docker builder prune -af
            docker image prune -af
            echo "✅ Docker cache cleanup completed."
      # 10. 本番デプロイ成功後に STG cleanup workflow を起動
      - name: Trigger STG cleanup workflow
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Triggering cleanup_stg.yml workflow..."
          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/cleanup_stg.yml/dispatches \
            -d '{"ref":"main"}'
